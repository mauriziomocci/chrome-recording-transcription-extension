<!DOCTYPE html>
<html>
  <head><title>Google Meet Helper</title></head>
  <body>
    <button id="save">Download Transcript</button>
    <hr/>
    <label><input type="checkbox" id="auto-transcript" checked> Auto-save transcript</label><br/>
    <label><input type="checkbox" id="auto-shots" checked> Auto screenshots (screen share)</label>
    <hr/>
    <button id="enable-mic">Enable Microphone</button>
    <hr/>
    <button id="start-rec">Start Recording</button>
    <button id="stop-rec" disabled>Stop & Download</button>
    <script src="popup.js"></script>
  </body>
</html>
